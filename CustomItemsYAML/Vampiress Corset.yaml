- name: Vampiric Claws
  automation:
    - type: variable
      name: monklevel
      value: MonkLevel
      onError: "0"
    - type: condition
      condition: monklevel < 5
      onTrue:
        - type: variable
          name: weapdamage
          value: "4"
      onFalse:
        - type: condition
          condition: monklevel < 11
          onTrue:
            - type: variable
              name: weapdamage
              value: "6"
          onFalse:
            - type: condition
              condition: monklevel < 17
              onTrue:
                - type: variable
                  name: weapdamage
                  value: "8"
              onFalse:
                - type: variable
                  name: weapdamage
                  value: "10"
              errorBehaviour: "false"
          errorBehaviour: "false"
      errorBehaviour: "false"
    - type: condition
      condition: level > 10
      onTrue:
        - type: condition
          condition: level > 15
          onTrue:
            - type: variable
              name: weapbonus
              value: "3"
          onFalse:
            - type: variable
              name: weapbonus
              value: "2"
          errorBehaviour: "false"
      onFalse:
        - type: variable
          name: weapbonus
          value: "2"
      errorBehaviour: "false"
    - type: condition
      condition: strengthMod > dexterityMod
      onTrue:
        - type: variable
          name: weapmod
          value: strengthMod
      onFalse:
        - type: variable
          name: weapmod
          value: dexterityMod
      errorBehaviour: "false"
    - type: target
      target: all
      effects:
        - type: attack
          hit:
            - type: damage
              damage: 1d{weapdamage} + {weapmod} + {weapbonus}[magical slashing] +
                1d4[necrotic]
              overheal: false
          miss: []
          attackBonus: proficiencyBonus + weapmod + weapbonus
