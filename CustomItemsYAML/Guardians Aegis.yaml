          Champion Challenge: As a bonus action, you issue a challenge that compels other creatures to do battle with you. Each creature of your choice that you can see within 30 feet of you must make a Wisdom saving throw. On a failed save, a creature can’t willingly move more than 30 feet away from you. This effect ends on the creature if you are incapacitated or die or if the creature is more than 30 feet away from you.
        title: "Varissa's Shield: Champion Challenge"
      - type: target
        target: all
        effects:
          - type: save
            stat: wis
            fail:
              - type: ieffect2
                name: Champion Challenge
                duration: null
                effects: null
                attacks: []
                buttons:
                  - label: Remove Champion Challenge
                    automation:
                      - type: remove_ieffect
                    verb: null
                    style: "3"
                    defaultDC: null
                    defaultAttackBonus: null
                    defaultCastingMod: null
                end: false
                conc: false
                desc: The User Cannot willingly move more than 30ft away from Varissa. The
                  effect ends if Varissa is incapacitated, dead, or more than
                  30ft away.
                stacking: false
                save_as: null
                parent: null
                target_self: false
                tick_on_caster: false
            success: []
    onFalse: []
    errorBehaviour: raise
  - type: condition
    condition: choice == "tide"
    onTrue:
      - type: text
        text: >-
          Granted for service to Vanalir and her mistress, Guardian's Aegis Provides
