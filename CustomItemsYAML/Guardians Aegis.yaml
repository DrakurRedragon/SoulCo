name: Guardian's Aegis
automation:
  - type: condition
    condition: choice == ""
    onTrue:
      - type: text
        text: Granted for service to Vanalir and her mistress, Guardian's Aegis Provides
          a nice boost to her AC, +1 at level 5, +2 at level 10, and +3 at level
          15. It also gives access to Special abilities from the Oath of the
          Crown, as well as a Fighter ability at level 15!
        title: Guardian's Aegis
      - type: text
        text: "`-choice champ` As a bonus action, you issue a challenge that compels
          other creatures to do battle with you. Each creature of your choice
          that you can see within 30 feet of you must make a Wisdom saving
          throw. On a failed save, a creature can’t willingly move more than 30
          feet away from you. This effect ends on the creature if you are
          incapacitated or die or if the creature is more than 30 feet away from
          you."
        title: "Champion Challenge:"
      - type: text
        text: "`-choice tide` As a bonus action, you can bolster injured creatures with
          your Channel Divinity. Each creature of your choice that can hear you
          within 30 feet of you regains hit points equal to 1d6 + your Charisma
          modifier (minimum of 1) if it has no more than half of its hit
          points."
        title: "Turn the Tide:"
      - type: text
        text: "`-choice aid` When the wearer or an ally fails an ability check, they can
          add a d4 to the roll, potentially turning the roll into a success.
          This benefit can be used a number of times equal to half your
          proficiency bonus, and all expended uses are restored when you finish
          a long rest, and both you and one of your allies can benefit from this
          buff."
        title: "Guardian's Aid:"
      - type: text
        text: "`-choice unyield` ***Starting at 15th level***, you have earned the
          ability to grant allies advantage on saving throws to avoid becoming
          paralyzed or stunned. all allies within 30ft of you is granted this
          benefit."
        title: "Unyielding Spirit:"
    onFalse: []
    errorBehaviour: "true"
  - type: condition
    condition: choice == "champ"
    onTrue:
      - type: text
        text: >-
          Granted for service to Vanalir and her mistress, Guardian's Aegis Provides
          a nice boost to her DC, +1 at level 5, +2 at level 10, and +3 at level
          15. It also gives access to Special abilities from the Oath of the
