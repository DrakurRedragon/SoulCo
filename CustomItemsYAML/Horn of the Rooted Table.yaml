                tick_on_caster: false
        errorBehaviour: "false"
      - type: text
        text: >-
          Once per long rest, if the horn is sounded within 10 feet of a shared meal
          or cooking fire, all participants may bond:

          • For 8 hours, bonded allies may share healing (one may use their reaction to forego healing and let another nearby gain it instead).

          • They may also communicate short emotions or images telepathically (like flavors, memories, or a sense of direction).


          Rare Upgrade:


          Once per day, when a bonded ally falls to 0 HP, one other bonded creature within 30 feet may immediately use their reaction to heal them for 1d6 + Wisdom modifier.
        title: Ceremony Effect — Feastbind
    onFalse: []
    errorBehaviour: neither
  - type: condition
    condition: choice == ""
    onTrue:
      - type: text
        text: >-
          This horn is carved from bone and dark elderwood, with little grooves like
          cutlery marks. It smells faintly of broth and bay leaves.


          Silent Alarm Effect (Shared Base): (`!a horn -choice alarm -t ally`)


          As an action, blow the horn. Up to 6 allies within 60 feet are silently alerted and gain advantage on their next action.  This can be used a number of times equal to the wielder's proficiency bonus, regaining all uses on a long rest.


          Ceremony Effect — Feastbind (`!a horn -choice feastbind -t ally`)


          Once per long rest, if the horn is sounded within 10 feet of a shared meal or cooking fire, all participants may bond:

          • For 8 hours, bonded allies may share healing (one may use their reaction to forego healing and let another nearby gain it instead).

          • They may also communicate short emotions or images telepathically (like flavors, memories, or a sense of direction).


          Rare Upgrade:


          Once per day, when a bonded ally falls to 0 HP, one other bonded creature within 30 feet may immediately use their reaction to heal them for 1d6 + Wisdom modifier.
        title: Effect
    onFalse: []
    errorBehaviour: "true"
