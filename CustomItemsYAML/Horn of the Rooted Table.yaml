name: Horn of the Rooted Table
automation:
  - type: condition
    condition: choice == "alarm"
    onTrue:
      - type: counter
        counter: Horn of the Rooted Table - Alarm
        amount: "1"
        allowOverflow: false
        errorBehaviour: raise
      - type: target
        target: all
        effects:
          - type: ieffect2
            name: Silent Alarm
            duration: "1"
            effects: null
            attacks: []
            buttons: []
            end: true
            conc: false
            desc: Adv on the next roll made
            stacking: false
            save_as: null
            parent: null
            target_self: false
            tick_on_caster: false
      - type: text
        text: As an action, blow the horn. Up to 6 allies within 60 feet are silently
          alerted and gain advantage on their next action.  This can be used a
          number of times equal to the wielder's proficiency bonus, regaining
          all uses on a long rest.
        title: Silent Alarm
    onFalse: []
    errorBehaviour: neither
  - type: condition
    condition: choice == "feastbind"
    onTrue:
      - type: counter
        counter: Horn of the Rooted Table - Feastbind
        amount: "1"
        allowOverflow: false
        errorBehaviour: raise
