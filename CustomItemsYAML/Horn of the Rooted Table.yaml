                              overheal: false
                        - type: text
                          text: >-
                            For 8 hours, bonded allies may share healing (one may use their reaction
                            to forego healing and let another nearby gain it
                            instead). 


                            (use `!a shared -amt # -t ally` to remove the healing from yourself and grant it targeted ally)
                          title: Effect
                      _v: 2
                      proper: true
                      verb: shares their boon with
                      activation_type: 4
                    defaultDC: null
                    defaultAttackBonus: null
                    defaultCastingMod: null
